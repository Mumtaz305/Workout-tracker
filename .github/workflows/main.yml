name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Reorganize flat structure into Android project
        run: |
          # Create all required directories
          mkdir -p app/src/main/java/com/sadtaz/workout
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # Move Kotlin source files
          mv MainActivity.kt       app/src/main/java/com/sadtaz/workout/ 2>/dev/null || true
          mv Database.kt           app/src/main/java/com/sadtaz/workout/ 2>/dev/null || true
          mv WorkoutData.kt        app/src/main/java/com/sadtaz/workout/ 2>/dev/null || true
          mv LogWorkoutActivity.kt app/src/main/java/com/sadtaz/workout/ 2>/dev/null || true
          mv HistoryActivity.kt    app/src/main/java/com/sadtaz/workout/ 2>/dev/null || true
          mv GraphActivity.kt      app/src/main/java/com/sadtaz/workout/ 2>/dev/null || true

          # Move AndroidManifest
          mv AndroidManifest.xml app/src/main/ 2>/dev/null || true

          # Move layout XMLs
          mv activity_main.xml        app/src/main/res/layout/ 2>/dev/null || true
          mv activity_log_workout.xml app/src/main/res/layout/ 2>/dev/null || true
          mv activity_history.xml     app/src/main/res/layout/ 2>/dev/null || true
          mv activity_graph.xml       app/src/main/res/layout/ 2>/dev/null || true
          mv item_exercise.xml        app/src/main/res/layout/ 2>/dev/null || true
          mv item_set_row.xml         app/src/main/res/layout/ 2>/dev/null || true
          mv item_history_entry.xml   app/src/main/res/layout/ 2>/dev/null || true
          mv item_history_date.xml    app/src/main/res/layout/ 2>/dev/null || true
          mv item_pr_row.xml          app/src/main/res/layout/ 2>/dev/null || true

          # Move drawable XMLs
          mv bg_input.xml   app/src/main/res/drawable/ 2>/dev/null || true
          mv bg_card.xml    app/src/main/res/drawable/ 2>/dev/null || true
          mv bg_set_num.xml app/src/main/res/drawable/ 2>/dev/null || true
          mv bg_badge.xml   app/src/main/res/drawable/ 2>/dev/null || true

          # Move values XMLs
          mv colors.xml  app/src/main/res/values/ 2>/dev/null || true
          mv strings.xml app/src/main/res/values/ 2>/dev/null || true
          mv themes.xml  app/src/main/res/values/ 2>/dev/null || true

          # Move gradle wrapper properties
          mv gradle-wrapper.properties gradle/wrapper/ 2>/dev/null || true

          # Rename build.gradle → app/build.gradle
          mv build.gradle app/build.gradle 2>/dev/null || true

          # Create root build.gradle
          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

          # Update settings.gradle — add JitPack for MPAndroidChart
          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          rootProject.name = "SadtazWorkout"
          include ':app'
          EOF

          # Create gradle-wrapper.properties if missing
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          fi

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SadtazWorkout-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
