name: Build APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Reorganize flat structure
        run: |
          mkdir -p app/src/main/java/com/sadtaz/workout
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper
          for f in MainActivity.kt Database.kt WorkoutData.kt LogWorkoutActivity.kt HistoryActivity.kt GraphActivity.kt; do mv $f app/src/main/java/com/sadtaz/workout/ 2>/dev/null || true; done
          mv AndroidManifest.xml app/src/main/ 2>/dev/null || true
          for f in activity_main.xml activity_log_workout.xml activity_history.xml activity_graph.xml item_exercise.xml item_set_row.xml item_history_entry.xml item_history_date.xml item_pr_row.xml; do mv $f app/src/main/res/layout/ 2>/dev/null || true; done
          for f in bg_input.xml bg_card.xml bg_set_num.xml bg_badge.xml; do mv $f app/src/main/res/drawable/ 2>/dev/null || true; done
          for f in colors.xml strings.xml themes.xml; do mv $f app/src/main/res/values/ 2>/dev/null || true; done
          mv build.gradle app/build.gradle 2>/dev/null || true
          printf 'plugins {\n    id "com.android.application" version "8.2.0" apply false\n    id "org.jetbrains.kotlin.android" version "1.9.0" apply false\n}\n' > build.gradle
          printf 'pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n        maven { url "https://jitpack.io" }\n    }\n}\nrootProject.name = "SadtazWorkout"\ninclude ":app"\n' > settings.gradle
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
      - name: Grant permission
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: SadtazWorkout-APK
          path: app/build/outputs/apk/debug/app-debug.apk
